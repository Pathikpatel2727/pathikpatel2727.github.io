<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Love ❤️</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,192,203,0.35), rgba(255,105,180,0.35)),
        url("Heer.jpeg") 98% 41% / cover no-repeat;
    }

    .overlay-start {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .start-btn {
      padding: 18px 28px;
      font-size: 1.1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: #ff4d88;
      color: white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    .card {
      width: min(75vw, 520px);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px 18px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.18);
      position: relative;
      transform: translateX(-339px);
    }

    h1 {
      margin: 0 0 10px;
      color: #d63384;
      font-size: clamp(1.8rem, 4vw, 3rem);
    }

    p {
      color: #444;
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .buttons {
      position: relative;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      padding: 14px 26px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: absolute;
    }

    #yesBtn {
      left: 35%;
      background: #28a745;
      color: white;
      box-shadow: 0 8px 20px rgba(40,167,69,0.25);
    }

    #yesBtn:hover {
      transform: scale(1.06);
    }

    #noBtn {
      left: 55%;
      background: #dc3545;
      color: white;
      box-shadow: 0 8px 20px rgba(220,53,69,0.25);
    }

    .message {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #d63384;
      min-height: 32px;
      font-weight: bold;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: floatUp 4s linear forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.4);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
  #yesBtn { left: 24%; }
  #noBtn { left: 58%; }

  .card {
    transform: translateX(-10px);
  }
}
  </style>
</head>
<body>

  <!-- Tap to start overlay -->
  <div class="overlay-start" id="startOverlay">
    <button class="start-btn" id="startBtn">Tap to Open ❤️</button>
  </div>

  <div class="card">
    <h1>Dear Heer ❤️</h1>
    <p>
      From the moment you came into my life, everything became more beautiful.<br>
      Will you be mine forever?
    </p>

    <div class="buttons" id="buttonArea">
      <button id="yesBtn">Yes 💖</button>
      <button id="noBtn">No 🙈</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <div class="hearts" id="hearts"></div>

  <!-- Your background song -->
  <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");
    const buttonArea = document.getElementById("buttonArea");
    const hearts = document.getElementById("hearts");
    const bgMusic = document.getElementById("bgMusic");
    const startOverlay = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");

    // Start music only after user interaction
    startBtn.addEventListener("click", async () => {
      startOverlay.style.display = "none";
      try {
        await bgMusic.play();
      } catch (e) {
        console.log("Music autoplay blocked:", e);
      }
    });

    // Funny moving "No" button
    function moveNoButton() {
      const areaRect = buttonArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = areaRect.width - btnRect.width;
      const maxY = areaRect.height - btnRect.height;

      const randomX = Math.max(0, Math.random() * maxX);
      const randomY = Math.max(0, Math.random() * maxY);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    // Move when cursor gets close
    document.addEventListener("mousemove", (e) => {
      const rect = noBtn.getBoundingClientRect();
      const dx = e.clientX - (rect.left + rect.width / 2);
      const dy = e.clientY - (rect.top + rect.height / 2);
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 100) {
        moveNoButton();
      }
    });

    // Also move on touch devices
    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton();
    });

    noBtn.addEventListener("mouseenter", moveNoButton);

    yesBtn.addEventListener("click", () => {
      message.innerHTML = "Yayyyyy! 💍❤️ I knew it, my love!";
      createHearts();
      yesBtn.disabled = true;
      noBtn.style.display = "none";
    });

    function createHearts() {
      for (let i = 0; i < 25; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = ["❤️","💖","💕","💘","💝"][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.bottom = "-20px";
        heart.style.animationDelay = (Math.random() * 1.5) + "s";
        heart.style.fontSize = (20 + Math.random() * 24) + "px";
        hearts.appendChild(heart);

        setTimeout(() => heart.remove(), 4500);
      }
    }
  </script>
</body>
</html>
