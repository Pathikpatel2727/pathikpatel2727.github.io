<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Love ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,192,203,0.35), rgba(255,105,180,0.35)),
        url("Heer.jpeg") 98% 35% / cover no-repeat;
    }

    .overlay-start {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .start-btn {
      padding: 18px 28px;
      font-size: 1.1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: #ff4d88;
      color: white;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      font-family: 'Playfair Display', serif;
    }

    .start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 28px rgba(0,0,0,0.3);
    }

    .card {
      width: min(75vw, 560px);
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 18px 18px 24px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.18);
      position: relative;
      opacity: 0;
      transform: translateX(-349px) translateY(20px);
      transition: opacity 1.5s ease, transform 1.5s ease;
    }

    .card.show {
      opacity: 1;
      transform: translateX(-349px) translateY(0);
    }

    .top-next {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .next-btn {
      position: static;
      padding: 12px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: #ff4d88;
      color: white;
      box-shadow: 0 8px 20px rgba(255,77,136,0.25);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      font-family: 'Playfair Display', serif;
    }

    .next-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 24px rgba(255,77,136,0.35);
    }

    h1 {
      margin: 0 0 18px;
      color: #d63384;
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.8rem, 5vw, 4rem);
      line-height: 1.2;
      letter-spacing: 1px;
      text-shadow: 0 4px 15px rgba(214,51,132,0.25);
      min-height: 72px;
      font-weight: normal;
    }

    #proposalText {
      color: #444;
      font-size: clamp(1.2rem, 2.4vw, 1.6rem);
      line-height: 1.7;
      margin-bottom: 28px;
      font-weight: 400;
      font-family: 'Playfair Display', serif;
    }

    .story-box {
      min-height: 190px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
    }

    .story-text {
      font-size: clamp(1.1rem, 2.6vw, 1.4rem);
      color: #333;
      line-height: 1.9;
      max-width: 95%;
      font-family: 'Playfair Display', serif;
      font-weight: 400;
    }

    .buttons {
      position: relative;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      padding: 14px 26px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: absolute;
      font-family: 'Playfair Display', serif;
    }

    #yesBtn {
      left: 35%;
      background: #28a745;
      color: white;
      box-shadow: 0 8px 20px rgba(40,167,69,0.25);
    }

    #yesBtn:hover {
      transform: scale(1.08);
    }

    #noBtn {
      left: 55%;
      background: #dc3545;
      color: white;
      box-shadow: 0 8px 20px rgba(220,53,69,0.25);
    }

    .message {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #d63384;
      min-height: 32px;
      font-weight: bold;
      font-family: 'Playfair Display', serif;
      line-height: 1.7;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: floatUp 4s linear forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.4);
        opacity: 0;
      }
    }

    .sparkle {
      position: absolute;
      font-size: 18px;
      animation: sparkleFloat 3s ease-out forwards;
      pointer-events: none;
    }

    @keyframes sparkleFloat {
      0% {
        transform: translateY(0) scale(0.7);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-70px) scale(1.3);
        opacity: 0;
      }
    }

    .hidden {
      display: none;
    }

    .story-text,
    #proposalSection p,
    .message,
    h1 {
      opacity: 0;
      transform: translateY(26px) scale(0.98);
      filter: blur(8px);
    }

    .text-romantic-show {
      animation: romanticReveal 1.5s ease forwards;
    }

    @keyframes romanticReveal {
      0% {
        opacity: 0;
        transform: translateY(26px) scale(0.98);
        filter: blur(8px);
      }
      55% {
        opacity: 1;
        transform: translateY(-5px) scale(1.01);
        filter: blur(2px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @media (max-width: 600px) {
      #yesBtn {
        left: 24%;
      }

      #noBtn {
        left: 58%;
      }

      .card {
        transform: translateX(-10px) translateY(20px);
        padding-top: 16px;
        width: calc(100vw - 24px);
      }

      .card.show {
        transform: translateX(-10px) translateY(0);
      }

      .top-next {
        margin-bottom: 26px;
      }

      h1 {
        margin-bottom: 20px;
        min-height: 64px;
        font-size: clamp(2.4rem, 8vw, 3.2rem);
      }

      .story-box {
        min-height: 240px;
      }

      .story-text {
        font-size: clamp(1rem, 4.5vw, 1.25rem);
        line-height: 1.8;
      }

      #proposalText {
        font-size: clamp(1.05rem, 4.8vw, 1.3rem);
      }
    }
  </style>
</head>
<body>

  <div class="overlay-start" id="startOverlay">
    <button class="start-btn" id="startBtn">Tap to Open ❤️</button>
  </div>

  <div class="card" id="mainCard">
    <div class="top-next" id="topNextWrapper">
      <button id="nextBtn" class="next-btn">Continue ❤️</button>
    </div>

    <h1 id="mainHeading">Dear Heer ❤️</h1>

    <div id="storySection" class="story-box">
      <div id="storyText" class="story-text"></div>
    </div>

    <div id="proposalSection" class="hidden">
      <p id="proposalText">
        From the moment you came into my life, everything became more beautiful.<br>
        <b>Will you be mine forever? 💍❤️</b>
      </p>

      <div class="buttons" id="buttonArea">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 🙈</button>
      </div>

      <div class="message" id="message"></div>
    </div>
  </div>

  <div class="hearts" id="hearts"></div>

  <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <script>
  const noBtn = document.getElementById("noBtn");
  const yesBtn = document.getElementById("yesBtn");
  const message = document.getElementById("message");
  const buttonArea = document.getElementById("buttonArea");
  const hearts = document.getElementById("hearts");
  const bgMusic = document.getElementById("bgMusic");
  const startOverlay = document.getElementById("startOverlay");
  const startBtn = document.getElementById("startBtn");

  const storySection = document.getElementById("storySection");
  const proposalSection = document.getElementById("proposalSection");
  const storyText = document.getElementById("storyText");
  const proposalText = document.getElementById("proposalText");
  const nextBtn = document.getElementById("nextBtn");
  const topNextWrapper = document.getElementById("topNextWrapper");
  const mainHeading = document.getElementById("mainHeading");
  const mainCard = document.getElementById("mainCard");

  const storyLines = [
    `❤️ On <b>Sunday, 1st February 2026</b>, the day I first saw your picture,<br><br>
    something changed inside me. From that very first moment, I could not take my eyes off you. ❤️`,

    `❤️ Then on <b>8th March</b>, I saw you in real life for the very first time at Jenno's Coffee House. ✨<br><br>
    That moment felt different... as if time slowed down, and everything around me disappeared except you. ❤️`,

    `❤️ And on <b>16th March</b>, I finally got your number. 💌<br><br>
    From that day on, our little chats became the most special part of my life. ❤️`
  ];

  let currentLine = 0;

    function animateText(element) {
      element.classList.remove("text-romantic-show");
      void element.offsetWidth;
      element.classList.add("text-romantic-show");
    }

    function showStoryLine() {
      if (currentLine === 0) {
        mainHeading.innerHTML = " <b>Dear Heer</b> ❤️";
        animateText(mainHeading);
      } else {
        mainHeading.innerHTML = "";
        mainHeading.classList.remove("text-romantic-show");
        mainHeading.style.opacity = "0";
      }

      storyText.innerHTML = storyLines[currentLine];
      animateText(storyText);
      createSparklesAroundCard();
    }

    nextBtn.addEventListener("click", () => {
      currentLine++;

      if (currentLine < storyLines.length) {
        showStoryLine();
      } else {
        storySection.classList.add("hidden");
        proposalSection.classList.remove("hidden");
        topNextWrapper.classList.add("hidden");
        mainHeading.innerHTML = "<b>Dear Heer</b> ❤️";
        animateText(mainHeading);
        animateText(proposalText);
        createSparklesAroundCard();
      }
    });

    startBtn.addEventListener("click", async () => {
      startOverlay.style.display = "none";

      try {
        await bgMusic.play();
      } catch (e) {
        console.log("Music autoplay blocked:", e);
      }

      setTimeout(() => {
        mainCard.classList.add("show");
      }, 500);

      setTimeout(() => {
        showStoryLine();
      }, 1200);
    });

    function moveNoButton() {
      const areaRect = buttonArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = areaRect.width - btnRect.width;
      const maxY = areaRect.height - btnRect.height;

      const randomX = Math.max(0, Math.random() * maxX);
      const randomY = Math.max(0, Math.random() * maxY);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    document.addEventListener("mousemove", (e) => {
      if (proposalSection.classList.contains("hidden")) return;

      const rect = noBtn.getBoundingClientRect();
      const dx = e.clientX - (rect.left + rect.width / 2);
      const dy = e.clientY - (rect.top + rect.height / 2);
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 100) {
        moveNoButton();
      }
    });

    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton();
    });

    noBtn.addEventListener("mouseenter", moveNoButton);

    yesBtn.addEventListener("click", () => {
      message.innerHTML = "Yayyyyy! 💍❤️ I knew it ❤️, <br><br>Forever yours, ❤️PatHik❤️";
      animateText(message);
      createHearts();
      createSparklesAroundCard();
      yesBtn.disabled = true;
      yesBtn.style.opacity = "0.85";
      noBtn.style.display = "none";
    });

    function createHearts() {
      for (let i = 0; i < 25; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = ["❤️", "💖", "💕", "💘", "💝"][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.bottom = "-20px";
        heart.style.animationDelay = (Math.random() * 1.5) + "s";
        heart.style.fontSize = (20 + Math.random() * 24) + "px";
        hearts.appendChild(heart);

        setTimeout(() => heart.remove(), 4500);
      }
    }

    function createSparklesAroundCard() {
      for (let i = 0; i < 10; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.innerHTML = ["✨", "💖", "💫"][Math.floor(Math.random() * 3)];
        sparkle.style.left = Math.random() * 100 + "vw";
        sparkle.style.top = (35 + Math.random() * 35) + "vh";
        sparkle.style.animationDelay = (Math.random() * 0.5) + "s";
        sparkle.style.fontSize = (16 + Math.random() * 14) + "px";
        hearts.appendChild(sparkle);

        setTimeout(() => sparkle.remove(), 3000);
      }
    }
  </script>
</body>
</html>
