<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Love ❤️</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        linear-gradient(rgba(255,192,203,0.30), rgba(255,105,180,0.30)),
        url("Heer.jpeg") 98% 41% / cover no-repeat;
    }

    .overlay-start {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.68);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .start-btn {
      padding: 18px 30px;
      font-size: 1.12rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: #ff4d88;
      color: white;
      box-shadow: 0 10px 28px rgba(0,0,0,0.25);
      transition: transform 0.2s ease;
    }

    .start-btn:hover {
      transform: scale(1.05);
    }

    .card {
      width: min(76vw, 540px);
      background: rgba(255,255,255,0.58);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 26px 18px;
      text-align: center;
      box-shadow: 0 12px 35px rgba(0,0,0,0.18);
      position: relative;
      transform: translateX(-339px);
      overflow: hidden;
    }

    h1 {
      margin: 0 0 10px;
      color: #d63384;
      font-size: clamp(1.9rem, 4vw, 3rem);
    }

    p {
      color: #444;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .hidden {
      display: none;
    }

    .story-box {
      min-height: 250px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 10px 12px;
    }

    .scene-badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: bold;
      color: #d63384;
      background: rgba(255,255,255,0.75);
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .story-text {
      font-size: clamp(1.12rem, 2.7vw, 1.42rem);
      color: #333;
      line-height: 1.85;
      margin: 0 auto 24px;
      max-width: 92%;
      min-height: 145px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .story-text.show {
      opacity: 1;
      transform: translateY(0);
    }

    .next-btn {
      padding: 12px 26px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: #ff4d88;
      color: white;
      box-shadow: 0 8px 20px rgba(255,77,136,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .next-btn:hover {
      transform: scale(1.05);
    }

    .proposal-section {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .proposal-section.show {
      opacity: 1;
      transform: translateY(0);
    }

    .proposal-text {
      margin-bottom: 14px;
    }

    .buttons {
      position: relative;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      padding: 14px 26px;
      font-size: 1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: absolute;
    }

    #yesBtn {
      left: 35%;
      background: #28a745;
      color: white;
      box-shadow: 0 8px 20px rgba(40,167,69,0.25);
    }

    #yesBtn:hover {
      transform: scale(1.06);
    }

    #noBtn {
      left: 55%;
      background: #dc3545;
      color: white;
      box-shadow: 0 8px 20px rgba(220,53,69,0.25);
    }

    .message {
      margin-top: 18px;
      font-size: 1.2rem;
      color: #d63384;
      min-height: 34px;
      font-weight: bold;
      line-height: 1.6;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: floatUp 4s linear forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translateY(-110vh) scale(1.4);
        opacity: 0;
      }
    }

    .sparkle {
      position: fixed;
      pointer-events: none;
      font-size: 20px;
      animation: sparkleFloat 2.8s ease forwards;
      opacity: 0;
    }

    @keyframes sparkleFloat {
      0% {
        transform: translateY(8px) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-60px) scale(1.3);
        opacity: 0;
      }
    }

    @media (max-width: 600px) {
      .card {
        width: min(92vw, 520px);
        transform: translateX(-10px);
        padding: 22px 14px;
      }

      #yesBtn { left: 24%; }
      #noBtn { left: 58%; }

      .story-box {
        min-height: 260px;
      }

      .story-text {
        min-height: 160px;
      }
    }
  </style>
</head>
<body>

  <div class="overlay-start" id="startOverlay">
    <button class="start-btn" id="startBtn">Tap to Open ❤️</button>
  </div>

  <div class="card">
    <h1>Dear Heer ❤️</h1>

    <div id="storySection" class="story-box">
      <div id="sceneBadge" class="scene-badge">Scene 1</div>
      <div id="storyText" class="story-text"></div>
      <button id="nextBtn" class="next-btn">Next ❤️</button>
    </div>

    <div id="proposalSection" class="proposal-section hidden">
      <p class="proposal-text">
        And now, after all these beautiful moments... ❤️<br><br>
        <strong>Will you be mine forever?</strong>
      </p>

      <div class="buttons" id="buttonArea">
        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 🙈</button>
      </div>

      <div class="message" id="message"></div>
    </div>
  </div>

  <div class="hearts" id="hearts"></div>

  <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");
    const buttonArea = document.getElementById("buttonArea");
    const hearts = document.getElementById("hearts");
    const bgMusic = document.getElementById("bgMusic");
    const startOverlay = document.getElementById("startOverlay");
    const startBtn = document.getElementById("startBtn");

    const storySection = document.getElementById("storySection");
    const proposalSection = document.getElementById("proposalSection");
    const storyText = document.getElementById("storyText");
    const nextBtn = document.getElementById("nextBtn");
    const sceneBadge = document.getElementById("sceneBadge");

    const storyScenes = [
      {
        badge: "Scene 1 • 1st February 2026",
        text: "On 1st February 2026, a Sunday… I got your picture. ❤️ And from that very first moment, something inside me changed… I couldn’t stop looking at you."
      },
      {
        badge: "Scene 2 • 8th March 2026",
        text: "Then on 8th March… I saw you for the first time. ✨ That moment felt unreal… like everything around me disappeared, and it was just you."
      },
      {
        badge: "Scene 3 • 16th March 2026",
        text: "And on 16th March… I got your number. 💌 From our first chat, you became the best part of my day… and slowly, my heart started falling for you."
      }
    ];

    let currentScene = 0;
    let isTyping = false;

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function typeWriter(text, element, speed = 30) {
      return new Promise((resolve) => {
        element.innerHTML = "";
        let i = 0;
        isTyping = true;

        function type() {
          if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, speed);
          } else {
            isTyping = false;
            resolve();
          }
        }

        type();
      });
    }

    async function showScene(index) {
      storyText.classList.remove("show");
      await delay(220);

      sceneBadge.textContent = storyScenes[index].badge;
      storyText.innerHTML = "";
      storyText.classList.add("show");

      await typeWriter(storyScenes[index].text, storyText, 28);

      if (index === storyScenes.length - 1) {
        nextBtn.textContent = "Proposal ❤️";
      } else {
        nextBtn.textContent = "Next ❤️";
      }

      createSparkles();
    }

    nextBtn.addEventListener("click", async () => {
      if (isTyping) return;

      currentScene++;

      if (currentScene < storyScenes.length) {
        await showScene(currentScene);
      } else {
        storySection.classList.add("hidden");
        proposalSection.classList.remove("hidden");
        setTimeout(() => proposalSection.classList.add("show"), 60);
      }
    });

    startBtn.addEventListener("click", async () => {
      startOverlay.style.display = "none";

      try {
        await bgMusic.play();
      } catch (e) {
        console.log("Music autoplay blocked:", e);
      }

      showScene(0);
    });

    function moveNoButton() {
      const areaRect = buttonArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = areaRect.width - btnRect.width;
      const maxY = areaRect.height - btnRect.height;

      const randomX = Math.max(0, Math.random() * maxX);
      const randomY = Math.max(0, Math.random() * maxY);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    document.addEventListener("mousemove", (e) => {
      if (proposalSection.classList.contains("hidden")) return;

      const rect = noBtn.getBoundingClientRect();
      const dx = e.clientX - (rect.left + rect.width / 2);
      const dy = e.clientY - (rect.top + rect.height / 2);
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 100) {
        moveNoButton();
      }
    });

    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton();
    });

    noBtn.addEventListener("mouseenter", moveNoButton);

    yesBtn.addEventListener("click", () => {
      message.innerHTML = "Yayyyyy! 💍❤️<br>I knew it, my love!";
      createHearts();
      yesBtn.disabled = true;
      noBtn.style.display = "none";
    });

    function createHearts() {
      for (let i = 0; i < 28; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = ["❤️", "💖", "💕", "💘", "💝"][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.bottom = "-20px";
        heart.style.animationDelay = (Math.random() * 1.5) + "s";
        heart.style.fontSize = (20 + Math.random() * 26) + "px";
        hearts.appendChild(heart);

        setTimeout(() => heart.remove(), 4500);
      }
    }

    function createSparkles() {
      const emojis = ["✨", "💖", "💕"];
      for (let i = 0; i < 10; i++) {
        const sp = document.createElement("div");
        sp.className = "sparkle";
        sp.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        sp.style.left = (15 + Math.random() * 70) + "vw";
        sp.style.top = (20 + Math.random() * 55) + "vh";
        sp.style.animationDelay = (Math.random() * 0.6) + "s";
        document.body.appendChild(sp);

        setTimeout(() => sp.remove(), 2800);
      }
    }
  </script>
</body>
</html>
